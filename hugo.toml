baseURL = "http://localhost:1313/"
title = "My Blog"
theme = "hugo-theme-stack-compat"
defaultContentLanguage = "zh-cn"
defaultContentLanguageInSubdir = false
hasCJKLanguage = true
enableRobotsTXT = true

[pagination]
  pagerSize = 8

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2

[taxonomies]
  tag = "tags"
  category = "categories"

[permalinks]
  posts = "/posts/:slug/"

[params]
  mainSections = ["posts"]
  featuredImageField = "image"
  rssFullContent = true

  [params.footer]
    since = 2022
    customText = ""

  [params.dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02"

  [params.sidebar]
    compact = false
    emoji = "☕"
    [params.sidebar.avatar]
      enabled = true
      local = true
      src = "img/avatar.png"

  [params.article]
    headingAnchor = false
    math = true
    toc = true
    readingTime = true

    [params.article.license]
      enabled = false

    [params.article.list]
      showTags = true

  [params.widgets]
    [[params.widgets.homepage]]
      type = "search"
    [[params.widgets.homepage]]
      type = "archives"
      [params.widgets.homepage.params]
        limit = 5
    [[params.widgets.homepage]]
      type = "tag-cloud"
      [params.widgets.homepage.params]
        limit = 10

    [[params.widgets.page]]
      type = "toc"
    [[params.widgets.page]]
      type = "archives"
      [params.widgets.page.params]
        limit = 5
    [[params.widgets.page]]
      type = "tag-cloud"
      [params.widgets.page.params]
        limit = 10

  [params.opengraph.twitter]
    card = "summary_large_image"

  [params.colorScheme]
    toggle = true
    default = "auto"

[languages]
  [languages.zh-cn]
    languageCode = "zh-CN"
    languageName = "中文"
    title = "我的博客"
    weight = 1

    [languages.zh-cn.params]
      description = "一个使用 Hugo Stack 主题搭建的中英双语个人博客。"

      [languages.zh-cn.params.sidebar]
        subtitle = "记录技术、想法和做过的小项目。"

    [languages.zh-cn.menus]
      [[languages.zh-cn.menus.main]]
        identifier = "home"
        name = "首页"
        pageRef = "/"
        weight = 10
        [languages.zh-cn.menus.main.params]
          icon = "home"
      [[languages.zh-cn.menus.main]]
        identifier = "archives"
        name = "归档"
        pageRef = "/page/archives"
        weight = 20
        [languages.zh-cn.menus.main.params]
          icon = "archives"
      [[languages.zh-cn.menus.main]]
        identifier = "search"
        name = "搜索"
        pageRef = "/page/search"
        weight = 30
        [languages.zh-cn.menus.main.params]
          icon = "search"
      [[languages.zh-cn.menus.main]]
        identifier = "tags"
        name = "标签"
        pageRef = "/tags"
        weight = 40
        [languages.zh-cn.menus.main.params]
          icon = "tag"
      [[languages.zh-cn.menus.main]]
        identifier = "about"
        name = "关于"
        pageRef = "/about"
        weight = 50
        [languages.zh-cn.menus.main.params]
          icon = "user"

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    title = "My Blog"
    weight = 2

    [languages.en.params]
      description = "A bilingual personal blog built with Hugo and the Stack theme."

      [languages.en.params.sidebar]
        subtitle = "Notes on code, electronics, and small projects."

    [languages.en.menus]
      [[languages.en.menus.main]]
        identifier = "home"
        name = "Home"
        pageRef = "/"
        weight = 10
        [languages.en.menus.main.params]
          icon = "home"
      [[languages.en.menus.main]]
        identifier = "archives"
        name = "Archives"
        pageRef = "/page/archives"
        weight = 20
        [languages.en.menus.main.params]
          icon = "archives"
      [[languages.en.menus.main]]
        identifier = "search"
        name = "Search"
        pageRef = "/page/search"
        weight = 30
        [languages.en.menus.main.params]
          icon = "search"
      [[languages.en.menus.main]]
        identifier = "tags"
        name = "Tags"
        pageRef = "/tags"
        weight = 40
        [languages.en.menus.main.params]
          icon = "tag"
      [[languages.en.menus.main]]
        identifier = "about"
        name = "About"
        pageRef = "/about"
        weight = 50
        [languages.en.menus.main.params]
          icon = "user"
